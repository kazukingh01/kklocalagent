# Example orchestrator config. All fields are optional — unset values
# fall back to Config::default() in src/config.rs.

[server]
# host:port to bind. Compose exposes this at 7000 per #4 §3.
listen = "0.0.0.0:7000"

[asr]
# whisper.cpp /inference endpoint. Inside compose, the service name
# "automatic-speech-recognition" resolves to the container; outside
# compose, point at 127.0.0.1:7040 (the published host port per #4 §3).
url = "http://automatic-speech-recognition:8080/inference"
# Per-request budget. large-v3-turbo on a 30 s utterance can approach
# 60 s on CPU; adjust for your model/hardware.
timeout_ms = 60000
# whisper-server handles one request at a time — queueing is pointless.
max_inflight = 1

[llm]
# ollama /api/chat endpoint. Inside compose, service name "llm"
# resolves; outside compose, 127.0.0.1:7050.
url = "http://llm:11434/api/chat"
# Must match a model pulled by the llm module (see llm/init.sh).
model = "gemma3:4b"
# Optional: prepended as {role:"system"} on every chat request.
# Empty (the default) → no system message; the LLM sees only the
# user turn. ollama normalises this to whatever chat template the
# loaded model uses, so the same string works across gemma3 / llama3
# / qwen / deepseek without per-model branching.
system_prompt = ""
# gemma3:4b on CPU can take a while on long prompts; 120 s is generous.
timeout_ms = 120000
max_inflight = 1

# Optional TTS speak channel. When url is empty (default) the
# orchestrator skips the TTS stage entirely — the assistant reply is
# logged but not voiced. Production wires this at the `tts-streamer`
# service which fronts VOICEVOX + the audio-io /spk push.
[tts]
url = "http://tts-streamer:7070/speak"
# Cancel-in-flight URL. Used by `wake.barge_in` to interrupt a
# TTS reply when the operator says the wake word again. Empty
# disables the cancel side-effect.
stop_url = "http://tts-streamer:7070/stop"
# Drain handshake target. POSTed once per turn after the last
# /speak — tts-streamer opens a fresh /spk WS, sends EOS, awaits
# audio-io's drained reply, and returns. The HTTP response is the
# precise speaker-silent moment used to anchor the post-TTS VAD
# quiet window. Empty skips the call (tail_quiet_ms then has to
# absorb audio-io's playback ring drain time as well).
finalize_url = "http://tts-streamer:7070/finalize"
# Generous because the streamer's response covers VOICEVOX synthesis
# *and* WS-streaming the frames at real time — a 5 s utterance
# physically takes 5 s to push through audio-io.
timeout_ms = 60000
max_inflight = 1
# Drop VAD events for this many ms after each turn's TTS completes.
# Covers audio-io's playback-ring tail so the assistant's own voice
# leaking back through the mic doesn't fire VAD and trigger an echo
# turn. WakeWordDetected stays unaffected — the operator deliberately
# barging in must still cut through. 0 disables (use when AEC is
# handled upstream).
tail_quiet_ms = 400

# Wake-gating policy. v1.0 default: gate the ASR→LLM→TTS pipeline
# on a recent WakeWordDetected event. Set `required = false` to fall
# back to v0.1 always-listening behaviour (every SpeechEnded fires
# the pipeline; useful for tests and debugging without speaking).
[wake]
required = true
# Window after a WakeWordDetected during which a SpeechStarted must
# arrive, in milliseconds. After this expires without a SpeechStarted,
# the state returns to Idle and the operator must re-wake.
wake_window_ms = 5000
# Window after a Turn finishes (TTS end) during which the *next*
# SpeechStarted is accepted as a follow-up — no fresh wake required.
# Lets the operator continue a conversation. After this expires,
# state returns to Idle.
turn_followup_window_ms = 10000
# When true and a new WakeWordDetected arrives mid-turn, cancel the
# in-flight TTS via `tts.stop_url` and re-arm with the wake_window.
# Off = mid-turn wake doesn't interrupt the current reply, but the
# post-turn state will be ArmedAfterWake (5 s) instead of
# ArmedAfterTurn (10 s).
barge_in = true
# Drop SpeechEnded events that land within this many milliseconds of
# the most recent WakeWordDetected. Targets the "VAD captures the
# wake word's own audio" flow: a bare "Hey Jarvis" makes VAD fire SE
# ~300 ms later with the wake word itself as audio, which would
# otherwise dispatch a turn whose ASR text is "Jervis"/"Alexa". A
# continuous "Hey Jarvis, what's the weather?" pushes the SE past
# 1 s thanks to VAD's silence hangover, so this default doesn't
# block real commands. Set to 0 to disable.
post_wake_se_dropout_ms = 800

# Optional outbound forwarder for handled events. When url is empty
# (the default) no forwarding happens — the orchestrator runs
# log-only. Currently emits:
#   - WakeWordDetected (forwarded as-is)
#   - TurnCompleted    (synthetic, on successful ASR→LLM completion)
# Used by the integration smoke to assert pipeline outcomes; in
# production this is the §10 "central event log" hook.
[result_sink]
# url = "http://test-driver:9300/sink"
# timeout_ms = 5000
