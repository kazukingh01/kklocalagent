# audio-io configuration. All sections are optional.

[server]
# Bind address. Defaults to loopback to avoid exposing the microphone on the LAN.
# Change to "0.0.0.0" only if you intentionally want remote access (and add auth upstream).
host = "127.0.0.1"
port = 7010

[audio]
# Wire format used on /mic and /spk WebSockets.
sample_rate = 16000   # Hz
channels    = 1       # mono
frame_ms    = 20      # bytes per frame = sample_rate * frame_ms / 1000 * 2

[input]
# "default" picks the OS default input device.
# Otherwise specify the exact device name reported by /devices.
device = "default"

[output]
device = "default"

[runtime]
# If false, capture and playback are idle until POST /start is called.
autostart = true
# Size of playback jitter buffer in milliseconds. Larger = more resilient
# to network jitter, smaller = lower end-to-end latency.
playback_buffer_ms = 10000
# Number of mic frames buffered in the broadcast channel for /mic subscribers.
# At 20ms/frame, 64 ≈ 1.28s of tolerance. When a subscriber falls further
# behind, older frames are **dropped** (not queued) and the connection
# receives a single Lagged warning covering the skipped frames. Increase for
# bursty consumers, decrease for tighter latency.
mic_broadcast_frames = 64
# Number of independent playback tracks. Each track owns its own cpal output
# stream + ring buffer; WASAPI shared mode mixes them at the OS layer so
# multiple clients can play in parallel without per-sample interference.
# Track id is selected with `?track=N` on the /spk WebSocket (default 0 keeps
# the legacy single-client setup working unchanged); `/spk/stop` accepts the
# same `?track=N` to stop just that track, or no query to stop all.
playback_tracks = 2

[aec]
# Acoustic echo cancellation (issue #20). audio-io cancels its own speaker
# output (the mix of all /spk tracks: TTS + play_audio_file) out of the mic so
# VAD and wake-word-detection don't self-trigger on the assistant's own voice.
# When enabled, `/mic` transparently serves the echo-cancelled stream (no
# client change). Disabled by default — when off this whole section is a
# no-op and `/mic` is byte-identical to before.
enabled = false
# Adaptive-filter backend. Only "nlms" (pure-Rust normalized LMS — no native
# dependency, cross-compiles to the mingw Windows target as-is) is implemented.
backend = "nlms"
# Adaptive filter length (ms): models the room echo tail after the bulk delay
# is removed. Longer = captures more reverb, more CPU (taps = ms * sample_rate).
filter_length_ms = 150
# Bulk far-end delay hint (ms): playback ring residency (playback_buffer_ms) +
# output + acoustic + capture latency. The far-end reference is delayed by this
# before entering the filter. Tune on real hardware so the filter converges.
initial_delay_ms = 120
